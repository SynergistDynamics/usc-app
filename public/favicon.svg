<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#000000"/>
  <!-- green roof line -->
  <line x1="70" y1="150" x2="442" y2="104" stroke="#9DBE4F" stroke-width="20" stroke-linecap="round"/>
  <!-- URBN wordmark -->
  <g fill="#ECE7DC" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-weight="700" font-size="168">
    <text x="86"  y="278">U</text>
    <text x="214" y="278">R</text>
    <text x="86"  y="418">B</text>
    <text x="214" y="418">N</text>
  </g>
  <!-- SHEDS, set vertically down the right edge -->
  <text x="372" y="150" fill="#9DBE4F"
        font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-weight="700" font-size="74" letter-spacing="6"
        transform="rotate(90 372 150)">SHEDS</text>
  <!-- small dash mark above SHEDS -->
  <rect x="360" y="118" width="10" height="34" rx="3" fill="#9DBE4F"/>
</svg>
